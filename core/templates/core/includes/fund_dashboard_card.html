{% comment %}
  fund, dashboard, is_current — dashboard from get_portfolio_dashboard_data
{% endcomment %}
{% if is_current %}
<div class="fund-card fund-card--current" aria-current="true">
    <div class="fund-card-hit fund-card-hit--static">
{% else %}
<form method="post" action="{% url 'core:funds' %}" class="fund-card-form">
    {% csrf_token %}
    <input type="hidden" name="fund_id" value="{{ fund.pk }}">
    <button type="submit" class="fund-card-hit" aria-label="Switch to fund {{ fund.name|default:'fund' }}">
{% endif %}

        <span class="fund-card-stats-grid">
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Fund</span>
                <span class="fund-card-name">{{ fund.name|default:"—" }}</span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Spread</span>
                <span class="fund-card-stat-value fund-card-stat-value--neutral">MEGA</span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Risk</span>
                <span class="fund-card-stat-value fund-card-stat-value--neutral">HIGH</span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Holdings</span>
                <span class="fund-card-stat-value fund-card-stat-value--neutral">{{ dashboard.holdings_count|default:"0" }}</span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Wealth</span>
                <span class="fund-card-stat-value">${{ dashboard.total_value|default:"0"|floatformat:2 }}</span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Return</span>
                <span class="fund-card-stat-value {% if dashboard.return_percent >= 0 %}positive{% else %}negative{% endif %}">
                    ${{ dashboard.return_amount|default:"0"|floatformat:2 }}
                </span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">Cash</span>
                <span class="fund-card-stat-value">${{ dashboard.cash|default:"0"|floatformat:2 }}</span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">PORTFOLIO P&amp;L</span>
                <span class="fund-card-stat-value {% if dashboard.holdings_pnl >= 0 %}positive{% else %}negative{% endif %}">
                    {{ dashboard.holdings_pnl|default:"0"|floatformat:2 }}%
                </span>
            </span>
            <span class="fund-card-stat">
                <span class="fund-card-stat-header">TOTAL P&amp;L</span>
                <span class="fund-card-stat-value {% if dashboard.return_percent >= 0 %}positive{% else %}negative{% endif %}">
                    {{ dashboard.return_percent|default:"0"|floatformat:2 }}%
                </span>
            </span>
        </span>
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 0.35rem; font-size: 0.75rem; color: #6c757d;">
            <div style="text-align: left;margin-left: 1.0rem">
                <span>{{ fund.description|default:"—" }}</span>
            </div>
            <div style="text-align: right; display: flex; justify-content: flex-end; gap: 1rem;">
                <div>
                    <span style="font-weight: 700; color: #6c757d;">ADVISORS:</span>
                    <span>{{ fund.advisors|join:", "|default:"—" }}</span>
                </div>
                <div>
                    <span style="font-weight: 700; color: #6c757d;">ESTAB:</span>
                    <span>{{ dashboard.estab_days|default:"—" }} DAYS</span>
                </div>
                <div>
                    <span style="font-weight: 700; color: #6c757d;">EST ABV:</span>
                    {% if dashboard.est_abv_percent >= 0 %}
                        <span style="color: #28a745;">{{ dashboard.est_abv_percent|default:"0"|floatformat:2 }}%</span>
                    {% else %}
                        <span style="color: #dc3545;">{{ dashboard.est_abv_percent|default:"0"|floatformat:2 }}%</span>
                    {% endif %}
                </div>
            </div>
        </div>
{% if is_current %}
    </div>
</div>
{% else %}
    </button>
</form>
{% endif %}
